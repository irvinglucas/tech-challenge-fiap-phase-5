quarkus.application.name=records-command-service
quarkus.http.port=8081

quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.exception-output-type=formatted
%test.quarkus.log.console.json=false
%dev.quarkus.log.console.json=false

# === Event store (Postgres) ===
# Em dev/prod aponta para o Postgres do infra/docker-compose.yml (postgres-command),
# usando as mesmas variaveis de ambiente do infra/.env.example.
# Em test, propositalmente NAO configurado: o Quarkus Dev Services sobe um
# Postgres efemero via Testcontainers automaticamente para cada execucao,
# incluindo a migracao Flyway.
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=${POSTGRES_COMMAND_USER:command_service}
%dev.quarkus.datasource.password=${POSTGRES_COMMAND_PASSWORD:command_service}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_COMMAND_HOST:localhost}:${POSTGRES_COMMAND_PORT:5432}/${POSTGRES_COMMAND_DB:records_command}

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${POSTGRES_COMMAND_USER:command_service}
%prod.quarkus.datasource.password=${POSTGRES_COMMAND_PASSWORD:command_service}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_COMMAND_HOST:localhost}:${POSTGRES_COMMAND_PORT:5432}/${POSTGRES_COMMAND_DB:records_command}

quarkus.flyway.migrate-at-start=true
