quarkus.application.name=records-query-service
quarkus.http.port=8082

quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.exception-output-type=formatted
quarkus.log.console.json.mdc.flat-fields=true
%test.quarkus.log.console.json=false
%dev.quarkus.log.console.json=false

# === Projecoes de leitura (Postgres) ===
# Em dev/prod aponta para o Postgres do infra/docker-compose.yml (postgres-query).
# Em test, propositalmente NAO configurado: o Quarkus Dev Services sobe um
# Postgres efemero via Testcontainers automaticamente.
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=${POSTGRES_QUERY_USER:query_service}
%dev.quarkus.datasource.password=${POSTGRES_QUERY_PASSWORD:query_service}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_QUERY_HOST:localhost}:${POSTGRES_QUERY_PORT:5433}/${POSTGRES_QUERY_DB:records_query}

%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${POSTGRES_QUERY_USER:query_service}
%prod.quarkus.datasource.password=${POSTGRES_QUERY_PASSWORD:query_service}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${POSTGRES_QUERY_HOST:localhost}:${POSTGRES_QUERY_PORT:5433}/${POSTGRES_QUERY_DB:records_query}

quarkus.flyway.migrate-at-start=true

# === Consumo de eventos (Kafka/Redpanda) ===
# Em dev/prod aponta para o Redpanda do infra/docker-compose.yml.
# Em test, propositalmente NAO configurado: o Quarkus Dev Services sobe um
# broker Kafka (Redpanda) efemero via Testcontainers automaticamente.
mp.messaging.incoming.patient-record-events-in.connector=smallrye-kafka
mp.messaging.incoming.patient-record-events-in.topic=patient-record-events
mp.messaging.incoming.patient-record-events-in.group.id=records-query-service
mp.messaging.incoming.patient-record-events-in.auto.offset.reset=earliest
mp.messaging.incoming.patient-record-events-in.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.patient-record-events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

%dev.kafka.bootstrap.servers=${REDPANDA_KAFKA_HOST:localhost}:${REDPANDA_KAFKA_PORT:19092}
%prod.kafka.bootstrap.servers=${REDPANDA_KAFKA_HOST:localhost}:${REDPANDA_KAFKA_PORT:19092}

# Publicacao do RecordAccessed/AccessDenied (issue #9) no mesmo topico consumido acima.
mp.messaging.outgoing.patient-record-events-out.connector=smallrye-kafka
mp.messaging.outgoing.patient-record-events-out.topic=patient-record-events
mp.messaging.outgoing.patient-record-events-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.patient-record-events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# === Autenticacao JWT (issue #9) ===
# Valida os tokens emitidos pelo emissor de demo do records-command-service
# (mesmo par de chaves, mesmo issuer).
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://prontuario-sus.fiap/records-command-service

# Apenas em test: assina tokens de teste com a chave privada correspondente
# (src/test/resources/privateKey.pem), sem expor essa capacidade em dev/prod.
%test.smallrye.jwt.sign.key.location=privateKey.pem
%test.smallrye.jwt.new-token.issuer=https://prontuario-sus.fiap/records-command-service

# === Tracing distribuido (issue #13) ===
# Exporta spans via OTLP para o Jaeger (infra/docker-compose.yml).
quarkus.otel.service.name=${quarkus.application.name}
%test.quarkus.otel.sdk.disabled=true
%dev.quarkus.otel.exporter.otlp.endpoint=http://${JAEGER_HOST:localhost}:${JAEGER_OTLP_GRPC_PORT:4317}
%prod.quarkus.otel.exporter.otlp.endpoint=http://${JAEGER_HOST:localhost}:${JAEGER_OTLP_GRPC_PORT:4317}
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p traceId=%X{traceId}, spanId=%X{spanId} [%c{2.}] (%t) %s%e%n
